# Render Blueprint — one-click deploy of the Factory Health Agent API.
# Docs: https://render.com/docs/blueprint-spec
#
# Deploys the FastAPI service from the Dockerfile. With no managed databases
# attached, the app uses its in-memory fallbacks (ephemeral, but fully
# functional for a demo). Add Render-managed Mongo/Redis and set the URIs below
# to make state durable.
services:
  - type: web
    name: factory-health-agent
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /v1/health
    autoDeploy: true
    envVars:
      # Secrets — set these in the Render dashboard (sync:false = not in git).
      - key: GEMINI_API_KEY
        sync: false
      # Strong JWT secret generated by Render on first deploy.
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: RATE_LIMIT_PER_MINUTE
        value: "100"
      # Optional: turn on LangSmith tracing by setting these in the dashboard.
      - key: LANGCHAIN_TRACING_V2
        value: "false"
      - key: LANGCHAIN_API_KEY
        sync: false
      - key: LANGCHAIN_PROJECT
        value: factory-health-agent
